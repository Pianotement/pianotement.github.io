<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Piano - V14.12 (Isolation Asynchrone & Accords Progressifs)</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* DESIGN GLOBAL ÉLITE */
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
            color: #fff;
            background-color: #1a1a1e;
            background-image: url('piano_app_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .top-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 100%; 
            margin: 0 auto 15px auto; 
            gap: 15px; 
            padding: 10px;
            background: rgba(42, 42, 53, 0.4);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            flex-wrap: wrap; 
        }

        .top-controls-left {
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: wrap;
        }

        .main-title { text-align: center; margin: 0; font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
        .main-title a { color: #f39c12; text-decoration: none; transition: color 0.3s; }
        .main-title a:hover { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        .youtube-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ff4757;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.25);
            transition: all 0.3s ease;
        }
        .youtube-link:hover {
            color: #fff;
            background: #ff4757;
            box-shadow: 0 0 12px rgba(255, 71, 87, 0.5);
            border-color: transparent;
        }
        .youtube-link svg { width: 16px; height: 16px; fill: currentColor; }

        .top-controls-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

        .midi-badge { 
            padding: 8px 18px; 
            border-radius: 30px; 
            font-weight: 600; 
            background: #c0392b; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }
        .midi-connected { background: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); border-color: transparent; }

        .btn-secondary { 
            background: linear-gradient(135deg, #444a50 0%, #2c3e50 100%); 
            color: #bdc3c7;
            font-size: 13px; 
            padding: 8px 16px; 
            border: 1px solid #555;
            text-transform: uppercase;
            font-weight: 600;
            flex-shrink: 0; 
            transition: all 0.3s ease;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-secondary:hover { 
            background: linear-gradient(135deg, #50565d 0%, #34495e 100%); 
            color: #fff; border-color: #777; box-shadow: 0 7px 12px rgba(0,0,0,0.4); transform: translateY(-2px);
        }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-erase { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); border-color: #c0392b; color: #fff;}
        .btn-erase:hover { background: linear-gradient(135deg, #e74c3c 0%, #ff7675 100%); border-color: #e74c3c;}

        .btn-scores, #btn-start-game {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            color: #1e1e24; border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase; font-weight: 800; flex-shrink: 0; transition: all 0.3s ease; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4);
        }
        .btn-scores { font-size: 13px; padding: 8px 16px; }
        .btn-scores:hover, #btn-start-game:hover {
            background: linear-gradient(135deg, #fff 0%, #f1c40f 100%); box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); transform: translateY(-2px);
        }

        .mode-indicator {
            background: linear-gradient(135deg, #1a2a6c 0%, #11347a 50%, #1a2a6c 100%);
            color: #ffffff; font-weight: 800; font-size: 14px; padding: 9px 16px; border-radius: 8px; border: 1px solid #4a7ab5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.25); text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            text-transform: uppercase; letter-spacing: 1px; cursor: default; user-select: none; flex-shrink: 0;
        }

        #cfg-presets {
            font-size: 16px; font-weight: 700; padding: 10px 35px 10px 15px; border: 2px solid #bdc3c7; 
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%); box-shadow: 0 4px 8px rgba(0,0,0,0.3); max-width: 260px; color: #fff;
        }
        #cfg-presets:focus { border-color: #f39c12; box-shadow: 0 0 12px rgba(243, 156, 18, 0.5); }

        select { 
            font-family: 'Montserrat', sans-serif; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; 
            background: linear-gradient(135deg, #2a2a35 0%, #1e1e24 100%); color: white; font-size: 14px; box-sizing: border-box; cursor: pointer; appearance: none; -webkit-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23bdc3c7%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 10px auto; transition: border-color 0.3s, box-shadow 0.3s;
        }
        select:focus { border-color: #f39c12; outline: none; box-shadow: 0 0 10px rgba(243, 156, 18, 0.4); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        select option { background-color: #2a2a35; color: #ffffff; padding: 10px; }

        #menu-config { 
            background: rgba(42, 42, 53, 0.35); max-width: 100%; margin: 10px auto 20px auto; padding: 25px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); text-align: left; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box;
        }
        
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .config-grid .config-group { display: flex; flex-direction: column; justify-content: center;}
        .config-group label { font-weight: 600; margin-bottom: 8px; color: #bdc3c7; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .panel { background: rgba(30, 30, 36, 0.6); padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); grid-column: span 2; }
        @media (max-width: 768px) { .panel { grid-column: span 1; } }
        .custom-ambitus-panel { display: none; margin-top: 15px; border: 1px dashed #555; padding: 10px; gap: 15px; border-radius: 8px;}

        /* HUD DU JEU */
        #game-ui { display: none; width: 100%; }
        #hud { 
            display: flex; justify-content: center; gap: 15px; font-size: 16px; font-weight: 600; margin: 10px auto; max-width: 100%; background: rgba(42, 42, 53, 0.9); 
            padding: 12px 20px; border-radius: 12px; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-transform: uppercase; box-sizing: border-box;
        }
        .stat { 
            padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%); display: inline-flex; align-items: center; gap: 8px;
        }
        #stat-fautes { background: #c0392b; border: none; box-shadow: 0 2px 10px rgba(192, 57, 43, 0.4);}
        #stat-score { background: #27ae60; border: none; box-shadow: 0 2px 10px rgba(39, 174, 96, 0.4);}
        #stat-level { background: #2980b9; border: none; box-shadow: 0 2px 10px rgba(41, 128, 185, 0.4);}
        
        #viewport-wrapper { width: 100%; padding: 15px 0; box-sizing: border-box; }
        #viewport { 
            position: relative; width: 100%; height: 560px; background: #ffffff; border-radius: 12px; overflow: hidden; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #f39c12; box-sizing: border-box;
        }
        #bg-staves { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 1; }
        #fixed-clefs { position: absolute; left: 0; top: 0; width: 180px; height: 100%; z-index: 10; background: #ffffff; border-right: 1px solid #e5e5e5; }
        #hitzone { position: absolute; left: 180px; top: 0; width: 240px; height: 100%; background: rgba(231, 76, 60, 0.06); border-left: 3px solid #e74c3c; border-right: 3px solid #e74c3c; z-index: 15; box-shadow: 0 0 15px rgba(231,76,60,0.2); pointer-events: none;}
        #track { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 5; }
        
        .note-column { 
            position: absolute; top: 0; left: 0; height: 100%; will-change: transform; transform: translateZ(0); backface-visibility: hidden; perspective: 1000px;
        }

        /* OVERLAYS ÉCRANS */
        .overlay-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.88); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .overlay-screen h2 { color: #e74c3c; font-size: 56px; margin: 0 0 15px 0; text-transform: uppercase; font-weight: 700;}
        
        #pause-screen { background: rgba(0, 0, 0, 0.12); backdrop-filter: none; position: absolute; z-index:30;}
        #pause-screen h2 { color: #1e1e24; background: rgba(255, 255, 255, 0.98); padding: 15px 40px; border-radius: 12px; font-size: 38px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); border: 2px solid #f39c12; text-shadow: none; margin-bottom: 25px; }

        .scores-container {
            background: rgba(42, 42, 53, 0.95); padding: 30px; border-radius: 12px; border: 2px solid #f39c12; 
            max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .scores-container h2 { font-size: 32px; color: #f39c12; border-bottom: none; margin-bottom: 20px;}
        .score-row { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 16px; font-weight: 600; color: #ecf0f1;}
        .score-row:hover { background: rgba(255,255,255,0.05); border-radius: 6px; }
        .score-row:last-child { border-bottom: none; }
        .score-val { color: #2ecc71; font-weight: 800; font-size: 18px; }

        button { 
            font-family: 'Montserrat', sans-serif; padding: 12px 24px; font-size: 15px; cursor: pointer; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; border: none; border-radius: 8px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        button:hover { background: linear-gradient(135deg, #3adb81 0%, #2ecc71 100%); transform: translateY(-2px); box-shadow: 0 7px 12px rgba(0,0,0,0.4); }
        button:active { transform: translateY(0); box-shadow: 0 3px 5px rgba(0,0,0,0.3); }

        #btn-pause { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); border-color: rgba(255,255,255,0.15);}
        #btn-pause:hover { background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); }
        
        .chk-label { display: flex; align-items: center; cursor: pointer; }
        .chk-label input { transform: scale(1.5); margin-right: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-controls" id="top-controls-bar">
        <div class="top-controls-left">
            <div class="main-title"><a href="https://www.pianotement.fr/" target="_blank">Pianotement.fr</a></div>
            <a href="https://youtube.com/@pianotement" target="_blank" class="youtube-link">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93 .502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                YouTube
            </a>
            <div id="midi-badge" class="midi-badge" data-i18n="midiWaiting">MIDI</div>
            <select id="cfg-lang" onchange="changerLangue(this.value)" style="width: auto; padding: 5px 30px 5px 10px; font-size: 13px;">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>
        
        <div id="top-controls-modes" class="top-controls-right">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="mode-indicator" data-i18n="btnModes">MODES :</div>
                <select id="cfg-presets" onchange="appliquerPresetSelectionne(this.value)">
                    <option value="" data-i18n="presetChoose">-- Modes de jeu --</option>
                    <optgroup label="Mode Arcade (Défis)" id="presets-arcade" data-i18n="presetArcade"></optgroup>
                    <optgroup label="Parties Enregistrées" id="presets-utilisateurs" data-i18n="presetUser"></optgroup>
                </select>
            </div>
            
            <button class="btn-secondary" onclick="creerNouveauPreset()" style="padding: 6px 12px; font-size: 12px;" data-i18n="btnSavePreset">+ Sauver</button>
            <button class="btn-secondary btn-erase" onclick="effacerPreset()" style="padding: 6px 12px; font-size: 12px;" data-i18n="btnErase">Effacer</button>
            <button class="btn-scores" onclick="afficherScores()" data-i18n="btnScores">Scores</button>
        </div>
    </div>

    <div style="display:none;">
        <input type="checkbox" id="cfg-md-melodie" checked>
        <input type="checkbox" id="cfg-md-fondamental">
        <input type="checkbox" id="cfg-md-renversement">
        <input type="checkbox" id="cfg-md-arpege-simple">
        <input type="checkbox" id="cfg-md-arpege-complexe">
        <input type="checkbox" id="cfg-mg-melodie" checked>
        <input type="checkbox" id="cfg-mg-fondamental">
        <input type="checkbox" id="cfg-mg-renversement">
        <input type="checkbox" id="cfg-mg-arpege-simple">
        <input type="checkbox" id="cfg-mg-arpege-complexe">
    </div>

    <div id="menu-config">
        <div class="config-grid">
            <div class="config-group">
                <label data-i18n="lblInputSource">Source d'entrée :</label>
                <select id="cfg-input-source" onchange="toggleInputSource()">
                    <option value="midi" selected data-i18n="srcMidi">Clavier numérique (MIDI USB)</option>
                    <option value="mic" data-i18n="srcMic">Piano Acoustique (Microphone)</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblSansErreur">Mode sans erreur :</label>
                <select id="cfg-sans-erreur">
                    <option value="on" selected data-i18n="optSeOn">Activé (Pénalité)</option>
                    <option value="off" data-i18n="optSeOff">Désactivé</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblMD">Clé de Sol :</label>
                <button id="btn-config-md" onclick="ouvrirConfigClef('md')" class="btn-secondary" style="padding: 10px; width: 100%; text-align: left; background: #2a2a35; border: 1px solid #444;" data-i18n="btnConfigAccords">⚙️ Configurer...</button>
            </div>
            
            <div class="config-group">
                <label data-i18n="lblMG">Clé de Fa :</label>
                <button id="btn-config-mg" onclick="ouvrirConfigClef('mg')" class="btn-secondary" style="padding: 10px; width: 100%; text-align: left; background: #2a2a35; border: 1px solid #444;" data-i18n="btnConfigAccords">⚙️ Configurer...</button>
            </div>

            <div class="config-group">
                <label data-i18n="lblIntervalle">Intervalle maximal :</label>
                <select id="cfg-intervalle">
                    <option value="2" data-i18n="intTierce">Tierce (Répétitions, Secondes, Tierces)</option>
                    <option value="3" data-i18n="intQuarte">Quarte max</option>
                    <option value="4" data-i18n="intQuinte">Quinte max</option>
                    <option value="5" data-i18n="intSixte">Sixte max</option>
                    <option value="libre" selected data-i18n="intLibre">Libre (Tous sauts autorisés)</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblTonalite">Tonalité (Armure) :</label>
                <select id="cfg-gamme">
                    <option value="C" selected>Do Maj / La Min (Rien)</option>
                    <option value="G">Sol Maj / Mi Min (1#)</option>
                    <option value="D">Ré Maj / Si Min (2#)</option>
                    <option value="A">La Maj / Fa# Min (3#)</option>
                    <option value="E">Mi Maj / Do# Min (4#)</option>
                    <option value="B">Si Maj / Sol# Min (5#)</option>
                    <option value="F#">Fa# Maj / Ré# Min (6#)</option>
                    <option value="F">Fa Maj / Ré Min (1b)</option>
                    <option value="Bb">Sib Maj / Sol Min (2b)</option>
                    <option value="Eb">Mib Maj / Do Min (3b)</option>
                    <option value="Ab">Lab Maj / Fa Min (4b)</option>
                    <option value="Db">Réb Maj / Sib Min (5b)</option>
                    <option value="Gb">Solb Maj / Mib Min (6b)</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblDebitTreble">Débit Clé de Sol (Densité) :</label>
                <select id="cfg-debit-treble">
                    <option value="220" selected data-i18n="debitBeg">Débutant</option>
                    <option value="180" data-i18n="debitNorm">Normal</option>
                    <option value="140" data-i18n="debitInt">Intermédiaire</option>
                    <option value="var25" data-i18n="debitVar25">Variable (0-25%)</option>
                    <option value="var50" data-i18n="debitVar50">Variable (0-50%)</option>
                    <option value="var75" data-i18n="debitVar75">Variable (0-75%)</option>
                </select>
            </div>
            
            <div class="config-group">
                <label data-i18n="lblDebitBass">Débit Clé de Fa (Densité) :</label>
                <select id="cfg-debit-bass">
                    <option value="220" selected data-i18n="debitBeg">Débutant</option>
                    <option value="180" data-i18n="debitNorm">Normal</option>
                    <option value="140" data-i18n="debitInt">Intermédiaire</option>
                    <option value="var25" data-i18n="debitVar25">Variable (0-25%)</option>
                    <option value="var50" data-i18n="debitVar50">Variable (0-50%)</option>
                    <option value="var75" data-i18n="debitVar75">Variable (0-75%)</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblAcceleration">Accélération :</label>
                <select id="cfg-acceleration">
                    <option value="0" data-i18n="accOff">Désactivée</option>
                    <option value="5" selected data-i18n="accFacile">Facile (5 %)</option>
                    <option value="10" data-i18n="accNormal">Normal (10 %)</option>
                    <option value="15" data-i18n="accDifficile">Difficile (15 %)</option>
                </select>
            </div>
            
            <div class="config-group">
                <label data-i18n="lblVitesse">Vitesse linéaire de départ :</label>
                <select id="cfg-vitesse">
                    <option value="25" data-i18n="vitVerySlow">Grand Débutant</option>
                    <option value="36" data-i18n="vitSlow">Lent (Débutant)</option>
                    <option value="65" selected data-i18n="vitMed">Moyen (Initié)</option>
                    <option value="95" data-i18n="vitFast">Rapide (Avancé)</option>
                </select>
            </div>

            <div class="config-group">
                <label data-i18n="lblFautes">Fautes autorisées :</label>
                <select id="cfg-fautes">
                    <option value="1" data-i18n="fSubite">1 (Mort subite)</option>
                    <option value="5" data-i18n="fCinq">5 fautes</option>
                    <option value="10" selected data-i18n="fDix">10 fautes</option>
                    <option value="infinity" data-i18n="fInfinie">Mode Infini</option>
                </select>
            </div>
            
            <div></div>

            <div class="panel" style="display: flex; align-items: stretch; gap: 20px; flex-wrap: wrap;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; flex-grow: 1;">
                    <div class="config-group">
                        <label data-i18n="lblAmbitusTreble">Ambitus Clé de Sol :</label>
                        <select id="cfg-ambitus-treble" onchange="toggleCustomAmbitus()">

        function autoCorrelate(buffer, sampleRate) {
            let rms = 0; for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
            rms = Math.sqrt(rms / buffer.length); if (rms < 0.02) return -1;
            let r1 = 0, r2 = buffer.length - 1; let thres = 0.2;
            for (let i = 0; i < buffer.length / 2; i++) if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
            for (let i = buffer.length - 1; i >= buffer.length / 2; i--) if (Math.abs(buffer[i]) < thres) { r2 = i; break; }
            let buf = buffer.slice(r1, r2); let c = new Float32Array(buf.length);
            for (let i = 0; i < buf.length; i++) for (let j = 0; j < buf.length - i; j++) c[i] += buf[j] * buf[j + i];
            let d = 0; while (c[d] > c[d + 1]) d++; let maxval = -1, maxpos = -1;
            for (let i = d; i < c.length; i++) if (c[i] > maxval && c[i] > c[i - 1] && c[i] > c[i + 1]) { maxval = c[i]; maxpos = i; }
            if (maxpos !== -1) return sampleRate / maxpos; return -1;
        }

        function analyserFrequenceMicro() {
            if (!jeuActif || enPause || !audioAnalyser) return;
            audioAnalyser.getFloatTimeDomainData(audioBuffer);
            let freq = autoCorrelate(audioBuffer, audioCtx.sampleRate);
            if (freq !== -1) {
                let midiNote = Math.round(12 * Math.log2(freq / 440) + 69);
                if (midiNote >= 21 && midiNote <= 108 && midiNote !== dernierPitchMidiDetecte) { dernierPitchMidiDetecte = midiNote; traiterEntreeNote(midiNote); }
            } else dernierPitchMidiDetecte = null;
        }

            if (idxMin > idxMax) [idxMin, idxMax] = [idxMax, idxMin];

        }

        function generateTriad(rootIndex, inversionLevel) {
            let i1 = rootIndex, i2 = rootIndex + 2, i3 = rootIndex + 4;
            if (inversionLevel === 1) i1 += 7; if (inversionLevel === 2) { i1 += 7; i2 += 7; }
            let indices = [i1, i2, i3].sort((a,b) => a-b);
            let n1 = TOUTES_LES_NOTES[indices[0]] || TOUTES_LES_NOTES[0], n2 = TOUTES_LES_NOTES[indices[1]] || TOUTES_LES_NOTES[0], n3 = TOUTES_LES_NOTES[indices[2]] || TOUTES_LES_NOTES[0];
            return { type: 'chord', keys: [n1.keys[0], n2.keys[0], n3.keys[0]], acc: ["", "", ""], midi: [n1.midi[0], n2.midi[0], n3.midi[0]], diatonicIndex: n1.diatonicIndex };
        }

        function generateArpeggio(rootIndex, pattern) {
            let sequence = [];

                sequence.push({ keys: [n.keys[0]], acc: [""], midi: [n.midi[0]] });
            }
            return { type: 'arpeggio', sequence: sequence, diatonicIndex: rootIndex };
        }

        function piocherNoteOptimisee(pool, tracker, dernierDiatonicIndex, maxIntervalleConfig) {
            tracker.notesGenereesCount++;
            if (tracker.historiqueVisites.size >= pool.length || tracker.notesGenereesCount % 75 === 0) tracker.historiqueVisites.clear();
            
            if (tracker.arpegesAForcer > 0) {
                tracker.arpegesAForcer--;
                tracker.vientDeJouerArpege = true;
                if (tracker.dernierArpege && Math.random() < 0.6) {
                    return tracker.dernierArpege;
                } else {
                    let arps = pool.filter(c => c.type === 'arpeggio');
                    if (arps.length > 0) {
                        let pick = arps[Math.floor(Math.random() * arps.length)];
                        tracker.dernierArpege = pick; return pick;
                    }
                }
            }

            let candidats = pool;
            if (maxIntervalleConfig !== "libre" && dernierDiatonicIndex !== null) {
                const intervalleMax = parseInt(maxIntervalleConfig); 
                candidats = pool.filter(n => Math.abs(n.diatonicIndex - dernierDiatonicIndex) <= intervalleMax);
                if (candidats.length === 0) candidats = pool;
            }

            let arpCandidates = candidats.filter(c => c.type === 'arpeggio');
            let baseCandidates = candidats.filter(c => c.type !== 'arpeggio');
            
            if (arpCandidates.length > 0 && baseCandidates.length > 0) {
                let pickArp = Math.random() < 0.25;
                candidats = pickArp ? arpCandidates : baseCandidates;
                if (candidats.length === 0) candidats = pool; 
            }

            let strKey = n => n.type === 'arpeggio' ? JSON.stringify(n.sequence.map(s=>s.midi)) : JSON.stringify(n.keys);
            let nonVisites = candidats.filter(n => !tracker.historiqueVisites.has(strKey(n)));
            let choisi = nonVisites.length > 0 ? nonVisites[Math.floor(Math.random() * nonVisites.length)] : candidats[Math.floor(Math.random() * candidats.length)];
            
            tracker.historiqueVisites.add(strKey(choisi));

            if (choisi.type === 'arpeggio') {
                tracker.arpegesAForcer = Math.floor(Math.random() * 2) + 1;
                tracker.dernierArpege = choisi;
                tracker.vientDeJouerArpege = true;
            } else {
                tracker.vientDeJouerArpege = false;
            }

            return choisi;
        }

        function calculerProchainEspacementTreble(tracker) {
            if (config.inputSource === "mic") { let baseVal = parseInt(document.getElementById("cfg-debit-bass").value); return isNaN(baseVal) ? 180 : baseVal; }
            let mode = document.getElementById("cfg-debit-treble").value;
            if (mode.startsWith("var")) {
                if (varCompteurTreble >= varTargetTreble) {
                    varCompteurTreble = 0; 
                    varTargetTreble = Math.floor(Math.random() * 6) + 5; 
                    let maxPct = parseInt(mode.replace("var", "")); 
                    let steps = maxPct / 5; 
                    let randomStep = Math.floor(Math.random() * (steps + 1)); 
                    varFacteurTreble = 1.0 + (randomStep * 0.05); 
                }
                varCompteurTreble++; return 180 * varFacteurTreble;
            }
            return parseInt(mode);
        }

        function calculerProchainEspacementBass(tracker) {
            if (config.inputSource === "mic") { let baseVal = parseInt(document.getElementById("cfg-debit-bass").value); return isNaN(baseVal) ? 180 : baseVal; }
            let mode = document.getElementById("cfg-debit-bass").value;
            if (mode.startsWith("var")) {
                if (varCompteurBass >= varTargetBass) {
                    varCompteurBass = 0; 
                    varTargetBass = Math.floor(Math.random() * 6) + 5; 
                    let maxPct = parseInt(mode.replace("var", "")); 
                    let steps = maxPct / 5; 
                    let randomStep = Math.floor(Math.random() * (steps + 1)); 
                    varFacteurBass = 1.0 + (randomStep * 0.05); 
                }
                varCompteurBass++; return 180 * varFacteurBass;
            }
            return parseInt(mode);
        }

        async function lancerJeu() {
            sauvegarderDansLocalStorage();
            config.inputSource = document.getElementById("cfg-input-source").value;
            if (config.inputSource === "mic") await initMicrophone();

            let armureChoisie = document.getElementById("cfg-gamme").value; genererBaseDeNotes(armureChoisie);
            let f = document.getElementById("cfg-fautes").value;
            config.modeInfini = (f === "infinity"); config.maxFautes = config.modeInfini ? 0 : parseInt(f);
            config.vitesse = parseInt(document.getElementById("cfg-vitesse").value); config.acceleration = parseInt(document.getElementById("cfg-acceleration").value);
            config.intervalleMax = document.getElementById("cfg-intervalle").value; config.modeSansErreur = (document.getElementById("cfg-sans-erreur").value === "on");

            varCompteurTreble = 0; varTargetTreble = 5; varFacteurTreble = 1.0;
            varCompteurBass = 0; varTargetBass = 5; varFacteurBass = 1.0;
            poolTreble = []; poolBass = [];

            let mdMelodie = document.getElementById("cfg-md-melodie").checked; let mdFond = document.getElementById("cfg-md-fondamental").checked; let mdRenv = document.getElementById("cfg-md-renversement").checked; let mdArpS = document.getElementById("cfg-md-arpege-simple").checked; let mdArpC = document.getElementById("cfg-md-arpege-complexe").checked;
            config.modeMD = (mdMelodie || mdFond || mdRenv || mdArpS || mdArpC) ? 'on' : 'off';
            if (config.modeMD === 'on') {
                const tMode = document.getElementById("cfg-ambitus-treble").value;
                let zoneMD = (tMode === "facile") ? getPool("c/4", "c/5") : (tMode === "normal") ? getPool("c/4", "c/6") : (tMode === "difficile") ? getPool("f/3", "b/5") : getPool(document.getElementById("treble-min").value, document.getElementById("treble-max").value);
                if (mdMelodie) poolTreble.push(...zoneMD);
                if (mdFond || mdRenv || mdArpS || mdArpC) {
                    for(let r=21; r<=27; r++) { 
                        if (mdFond) poolTreble.push(generateTriad(r, 0));
                        if (mdRenv) { poolTreble.push(generateTriad(r, 1)); poolTreble.push(generateTriad(r, 2)); }
                        if (mdArpS) ARPEGES_SIMPLES.forEach(pat => { let a = generateArpeggio(r, pat); if(a) poolTreble.push(a); });
                        if (mdArpC) ARPEGES_COMPLEXES.forEach(pat => { let a = generateArpeggio(r, pat); if(a) poolTreble.push(a); });
                    }
                }
            }

            let mgMelodie = document.getElementById("cfg-mg-melodie").checked; let mgFond = document.getElementById("cfg-mg-fondamental").checked; let mgRenv = document.getElementById("cfg-mg-renversement").checked; let mgArpS = document.getElementById("cfg-mg-arpege-simple").checked; let mgArpC = document.getElementById("cfg-mg-arpege-complexe").checked;
            config.modeMG = (mgMelodie || mgFond || mgRenv || mgArpS || mgArpC) ? 'on' : 'off';
            if (config.modeMG === 'on') {
                const bMode = document.getElementById("cfg-ambitus-bass").value;
                let zoneMG = (bMode === "facile") ? getPool("c/3", "c/4") : (bMode === "normal") ? getPool("c/2", "c/4") : (bMode === "difficile") ? getPool("f/2", "c/5") : getPool(document.getElementById("bass-min").value, document.getElementById("bass-max").value);
                if (mgMelodie) poolBass.push(...zoneMG);
                if (mgFond || mgRenv || mgArpS || mgArpC) {
                    for(let r=7; r<=13; r++) { 
                        if (mgFond) poolBass.push(generateTriad(r, 0));
                        if (mgRenv) { poolBass.push(generateTriad(r, 1)); poolBass.push(generateTriad(r, 2)); }
                        if (mgArpS) ARPEGES_SIMPLES.forEach(pat => { let a = generateArpeggio(r, pat); if(a) poolBass.push(a); });
                        if (mgArpC) ARPEGES_COMPLEXES.forEach(pat => { let a = generateArpeggio(r, pat); if(a) poolBass.push(a); });
                    }
                }
            }

            document.getElementById("top-controls-bar").style.display = "none";
            document.getElementById("menu-config").style.display = "none"; document.getElementById("game-ui").style.display = "block";
            document.getElementById("game-over-screen").style.display = "none"; document.getElementById("pause-screen").style.display = "none";
            dessinerEnvironnementStatique();
            
            score = 0; fautes = 0; niveau = 1; notesValideesCeNiveau = 0; currentX = 0; 
            if (config.inputSource === "mic") { let baseVal = parseInt(document.getElementById("cfg-debit-bass").value); if (isNaN(baseVal)) baseVal = 180; dernierXBass = 250; dernierXTreble = 250 + (baseVal * 0.25); } 
            else { dernierXTreble = 250; dernierXBass = 250; }

            dernierDiatonicIndexTreble = null; dernierDiatonicIndexBass = null; dernierPitchMidiDetecte = null;
            trackerTreble = { notesGenereesCount: 0, historiqueVisites: new Set(), arpegesAForcer: 0, dernierArpege: null, vientDeJouerArpege: false };
            trackerBass = { notesGenereesCount: 0, historiqueVisites: new Set(), arpegesAForcer: 0, dernierArpege: null, vientDeJouerArpege: false };
            colonnesEnCours = []; trackDOM.innerHTML = ""; enPause = false;
            
            document.getElementById("lbl-score").innerText = score; document.getElementById("lbl-level").innerText = niveau;
            document.getElementById("lbl-fautes").innerText = config.modeInfini ? `0 (${DICTIONNAIRE[langueActuelle].infiniteLabel})` : `0 / ${config.maxFautes}`;
            
            const dynamicWidth = document.getElementById("viewport").clientWidth || window.innerWidth;
            while (dernierXTreble < dynamicWidth + 250) { dernierXTreble += calculerProchainEspacementTreble(trackerTreble); if (config.modeMD !== "off") dernierXTreble += creerColonne(dernierXTreble, true); }
            while (dernierXBass < dynamicWidth + 250) { dernierXBass += calculerProchainEspacementBass(trackerBass); if (config.modeMG !== "off") dernierXBass += creerColonne(dernierXBass, false); }
            jeuActif = true; dernierTimestamp = performance.now(); requestAnimationFrame(boucleDeJeu);
        }

        function togglePause() {
            if (!jeuActif) return; enPause = !enPause; document.getElementById("pause-screen").style.display = enPause ? "flex" : "none";
            if (!enPause) { dernierTimestamp = performance.now(); requestAnimationFrame(boucleDeJeu); }
        }

        window.addEventListener('keydown', function(e) { if (e.code === 'Space' && document.getElementById("game-ui").style.display === "block") { e.preventDefault(); togglePause(); } });
        window.addEventListener('resize', function() { if (jeuActif) dessinerEnvironnementStatique(); });

        function creerColonne(absoluteX, isTreble) {
            let pool = isTreble ? poolTreble : poolBass; let tracker = isTreble ? trackerTreble : trackerBass;
            let dernierDiatonic = isTreble ? dernierDiatonicIndexTreble : dernierDiatonicIndexBass;
            let item = piocherNoteOptimisee(pool, tracker, dernierDiatonic, config.intervalleMax);
            
            if (isTreble) dernierDiatonicIndexTreble = item.diatonicIndex; else dernierDiatonicIndexBass = item.diatonicIndex;

            const colDiv = document.createElement("div"); colDiv.className = "note-column"; 
            colDiv.style.transform = `translate3d(${absoluteX - currentX}px, 0, 0)`; trackDOM.appendChild(colDiv);

            const colObj = { xBase: absoluteX, element: colDiv, processed: false, clef: isTreble ? 'treble' : 'bass', type: item.type, subNotes: [] };
            if (item.type === 'arpeggio') colObj.subNotes = item.sequence.map(n => ({ keys: n.keys, acc: n.acc, midi: n.midi, pressed: [], status: 'pending', localX: 0 }));
            else colObj.subNotes = [{ keys: item.keys, acc: item.acc, midi: item.midi, pressed: [], status: 'pending', localX: 0 }];

            redessinerColonne(colObj); colonnesEnCours.push(colObj);
            
            let isArp = item.type === 'arpeggio';
            let noteCount = isArp ? item.sequence.length : 1;
            let baseWidth = isArp ? Math.max(140, noteCount * 45 + 40) : 120;
            
            let extraWidth = isArp ? ((baseWidth - 120) * 1.4) : 0;
            return extraWidth;
        }

        function redessinerColonne(col) {
            col.element.innerHTML = ""; let isArp = col.type === 'arpeggio';
            
            let baseWidth = isArp ? Math.max(140, col.subNotes.length * 45 + 40) : 120;
            col.element.style.width = baseWidth + "px";
            
            const renderer = new VF.Renderer(col.element, VF.Renderer.Backends.SVG);
            renderer.resize(baseWidth * 1.4, 560); const context = renderer.getContext(); context.scale(1.4, 1.4);
            const stave = new VF.Stave(0, col.clef === 'treble' ? 50 : 230, baseWidth);

            let staveNotes = [];
            col.subNotes.forEach(sub => {
                let note = new VF.StaveNote({ clef: col.clef, keys: sub.keys, duration: isArp ? "8" : "q" });
                sub.acc.forEach((a, i) => { if(a) note.addModifier(new VF.Accidental(a), i); });
                
                // Coloration VexFlow dynamique pour chaque clé (Note On)
                if (sub.status === 'hit') {
                    note.setStyle({ fillStyle: "#2ecc71", strokeStyle: "#2ecc71" });
                } else if (sub.status === 'missed') {
                    note.setStyle({ fillStyle: "#e74c3c", strokeStyle: "#e74c3c" });
                } else {
                    note.setStyle({ fillStyle: "#2c3e50", strokeStyle: "#2c3e50" });
                    // On colore les têtes de notes individuellement si elles sont pressées
                    sub.pressed.forEach(midiNum => {
                        let keyIndex = sub.midi.indexOf(midiNum);
                        if (keyIndex !== -1) {
                            note.setKeyStyle(keyIndex, { fillStyle: "#2ecc71", strokeStyle: "#2ecc71" });
                        }
                    });
                }
                staveNotes.push(note);
            });

            let voice = new VF.Voice({num_beats: staveNotes.length, beat_value: isArp ? 8 : 4}).addTickables(staveNotes);
            
            new VF.Formatter().joinVoices([voice]).format([voice], baseWidth - 30);
            
            let beam = null; if (isArp && staveNotes.length > 1) beam = new VF.Beam(staveNotes);

            voice.draw(context, stave); if (beam) beam.setContext(context).draw();
            staveNotes.forEach((sn, idx) => { col.subNotes[idx].localX = sn.getAbsoluteX() * 1.4; });
        }

        function boucleDeJeu(timestamp) {
            if (!jeuActif || enPause) return;
            let dt = (timestamp - dernierTimestamp) / 1000; if (dt > 0.1) dt = 0.0166;
            dernierTimestamp = timestamp; currentX += config.vitesse * dt;
            if (config.inputSource === "mic") analyserFrequenceMicro();

            const viewWidth = document.getElementById("viewport").clientWidth || window.innerWidth;

            for (let col of colonnesEnCours) {
                let positionEcran = col.xBase - currentX; col.element.style.transform = `translate3d(${positionEcran}px, 0, 0)`;

                if (!col.processed) {
                    let allProcessed = true; let reqRedraw = false;
                    col.subNotes.forEach(sub => {
                        let notePos = positionEcran + sub.localX;
                        if (sub.status === 'pending') { 
                            if (notePos < 180) { 
                                sub.status = 'missed'; fautes++; reqRedraw = true; 
                            } else {
                                allProcessed = false; 
                            }
                        }
                    });

                    if (reqRedraw) {
                        redessinerColonne(col); 
                        document.getElementById("lbl-fautes").innerText = config.modeInfini ? `${fautes} (${DICTIONNAIRE[langueActuelle].infiniteLabel})` : `${fautes} / ${config.maxFautes}`;
                        if (!config.modeInfini && fautes >= config.maxFautes) { terminerJeu(); return; }
                    }
                    
                    if (allProcessed) { 
                        col.processed = true; 
                        if (col.subNotes.some(s => s.status === 'missed')) {
                            col.element.style.transition = "opacity 0.6s ease-out";
                            col.element.style.opacity = "0";
                        }
                    }
                }
            }

            colonnesEnCours = colonnesEnCours.filter(col => {
                if ((col.xBase - currentX + (col.subNotes.length * 45 * 1.4)) < -170) { col.element.remove(); return false; } return true; 
            });

            while (dernierXTreble < currentX + viewWidth + 250) { dernierXTreble += calculerProchainEspacementTreble(trackerTreble); if (config.modeMD !== "off") dernierXTreble += creerColonne(dernierXTreble, true); }
            while (dernierXBass < currentX + viewWidth + 250) { dernierXBass += calculerProchainEspacementBass(trackerBass); if (config.modeMG !== "off") dernierXBass += creerColonne(dernierXBass, false); }
            requestAnimationFrame(boucleDeJeu);
        }

        function terminerJeu() {
            jeuActif = false;
            document.getElementById("final-score").innerText = `Niveau ${niveau} | Score : ${score} pts`;
            enregistrerScoreFinDePartie(score); 
            document.getElementById("game-over-screen").style.display = "flex";
        }

        function retourMenu() {
            jeuActif = false; enPause = false;
            document.getElementById("game-ui").style.display = "none"; document.getElementById("menu-config").style.display = "block";
            document.getElementById("top-controls-bar").style.display = "flex"; updateBadgeVisual();
        }

        function validerNote(col, sub, noteJouee) {
            if (!sub.pressed.includes(noteJouee)) {
                sub.pressed.push(noteJouee);
                redessinerColonne(col); // On redessine immédiatement pour colorer la tête de note
            }
            
            if (sub.pressed.length === sub.midi.length && sub.status !== 'hit') { 
                sub.status = 'hit'; 
                score += (10 * sub.midi.length); 
                document.getElementById("lbl-score").innerText = score; 
                redessinerColonne(col);

                let allProcessed = col.subNotes.every(s => s.status !== 'pending');
                if (allProcessed && col.subNotes.every(s => s.status === 'hit')) {
                    col.processed = true; 
                    notesValideesCeNiveau++;
                    if (notesValideesCeNiveau >= 15) { 
                        niveau++; notesValideesCeNiveau = 0; 
                        config.vitesse *= (1 + (config.acceleration / 100)); 
                        document.getElementById("lbl-level").innerText = niveau; 
                    }
                }
            }
        }

        function traiterEntreeNote(noteJouee) {
            let noteAcceptee = false;

            // 1. RECHERCHE ASYNCHRONE CLÉ DE SOL
            let cibleTreble = null;
            for (let col of colonnesEnCours) {
                if (col.processed || col.clef !== 'treble') continue;
                let pendingSub = col.subNotes.find(s => s.status === 'pending');
                if (pendingSub) {
                    let positionEcran = col.xBase - currentX;
                    let firstNotePos = positionEcran + col.subNotes[0].localX;
                    // L'entité devient éligible dès que sa première note passe les 420px
                    if (firstNotePos <= 420) {
                        let notePos = positionEcran + pendingSub.localX;
                        if (notePos >= 130) { cibleTreble = { col, sub: pendingSub }; }
                    }
                    break; 
                }
            }

            // 2. RECHERCHE ASYNCHRONE CLÉ DE FA
            let cibleBass = null;
            for (let col of colonnesEnCours) {
                if (col.processed || col.clef !== 'bass') continue;
                let pendingSub = col.subNotes.find(s => s.status === 'pending');
                if (pendingSub) {
                    let positionEcran = col.xBase - currentX;
                    let firstNotePos = positionEcran + col.subNotes[0].localX;
                    if (firstNotePos <= 420) {
                        let notePos = positionEcran + pendingSub.localX;
                        if (notePos >= 130) { cibleBass = { col, sub: pendingSub }; }
                    }
                    break; 
                }
            }

            // 3. VALIDATION INDÉPENDANTE (Résout le blocage des notes simultanées)
            if (cibleTreble && cibleTreble.sub.midi.includes(noteJouee)) {
                validerNote(cibleTreble.col, cibleTreble.sub, noteJouee);
                noteAcceptee = true;
            }
            if (cibleBass && cibleBass.sub.midi.includes(noteJouee)) {
                validerNote(cibleBass.col, cibleBass.sub, noteJouee);
                noteAcceptee = true;
            }

            // 4. ABSORPTION DYNAMIQUE DES NOTES EN ZONE (Tolérance / Anti-rebond)
            let noteAbsorbee = false;
            if (!noteAcceptee) {
                for (let col of colonnesEnCours) {
                    let positionEcran = col.xBase - currentX;
                    let firstNotePos = positionEcran + col.subNotes[0].localX;
                    if (firstNotePos <= 450 && firstNotePos >= 100) { 
                        for (let sub of col.subNotes) {
                            if (sub.midi.includes(noteJouee)) {
                                noteAbsorbee = true; break;
                            }
                        }
                    }
                    if (noteAbsorbee) break;
                }
            }

            // 5. SANCTION UNIQUEMENT SI NOTE TOTALEMENT HORS CONTEXTE
            if (!noteAcceptee && !noteAbsorbee && config.modeSansErreur) {
                fautes++; 
                document.getElementById("lbl-fautes").innerText = config.modeInfini ? `${fautes} (${DICTIONNAIRE[langueActuelle].infiniteLabel})` : `${fautes} / ${config.maxFautes}`;
                if (!config.modeInfini && fautes >= config.maxFautes) { terminerJeu(); return; }
            }
        }

        function getMIDIMessage(midiMessage) {
            if (!jeuActif || enPause || config.inputSource !== "midi") return;
            const command = midiMessage.data[0], noteJouee = midiMessage.data[1], velocity = (midiMessage.data.length > 2) ? midiMessage.data[2] : 0;
            if (command === 144 && velocity > 0) traiterEntreeNote(noteJouee);
        }

        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(
                midiAccess => { midiGlobalConnected = true; updateBadgeVisual(); for (let input of midiAccess.inputs.values()) input.onmidimessage = getMIDIMessage; },
                () => { midiGlobalConnected = false; updateBadgeVisual(); }
            );
        }

        function extraireConfigurationJson() {
            let configObj = {};
            CONFIG_KEYS.forEach(key => {
                const el = document.getElementById(key);
                if (el) { if (el.type === 'checkbox') configObj[key] = el.checked; else configObj[key] = el.value; }
            });
            return JSON.stringify(configObj, null, 2);
        }

        function appliquerConfigurationJson(jsonStr) {
            try {
                let configObj = JSON.parse(jsonStr);
                CONFIG_KEYS.forEach(key => { if (configObj[key] !== undefined && document.getElementById(key)) { let el = document.getElementById(key); if (el.type === 'checkbox') el.checked = configObj[key]; else el.value = configObj[key]; } });
                if(configObj["cfg-lang"]) changerLangue(configObj["cfg-lang"]);
            } catch(e) { console.error("Erreur lors de l'application de la config", e); }
        }

        function sauvegarderDansLocalStorage() { localStorage.setItem("pianotement_config", extraireConfigurationJson()); }
        function chargerDepuisLocalStorage() {
            let saved = localStorage.getItem("pianotement_config");
            if(saved) { appliquerConfigurationJson(saved); toggleInputSource(); toggleCustomAmbitus(); } 
            else { let osLang = navigator.language || navigator.userLanguage || "fr"; osLang = osLang.substring(0, 2).toLowerCase(); if (["fr", "en", "es"].includes(osLang)) { document.getElementById("cfg-lang").value = osLang; changerLangue(osLang); } else changerLangue("fr"); }
        }

        peuplerSelectsAmbitus(); chargerDepuisLocalStorage(); initialiserGestionnairePresets();
    </script>
